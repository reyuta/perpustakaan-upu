<html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Buku</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f4f4;
        }

        h2{
            color:#1d3fbf;
            font-weight:bold;
        }

        .card{
            transition:.3s;
            border-radius:10px;
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }

        .card img{
            height:250px;
            object-fit:cover;
            border-radius:10px 10px 0 0;
        }

        .card-title{
            font-size:15px;
            font-weight:bold;
        }

        .card-text{
            font-size:12px;
            color:gray;
        }

        .btn-detail{
            font-size:12px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">Jenis- jenis Buku</h2>

    <div class="row justify-content-center g-4">

        <div class="col-md-3 col-sm-6">
            <div class="card h-100">
                <img src="book1.jpeg" class="card-img-top" alt="">
                <div class="card-body text-center">
                    <h6 class="card-title">Bank Syari'ah</h6>
                    <p class="card-text">Muhammad Syafi'i Antonio</p>

                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card h-100">
                <img src="book2.jpeg" class="card-img-top" alt="">
                <div class="card-body text-center">
                    <h6 class="card-title">Sikap Manusia</h6>
                    <p class="card-text">Dr. Saifuddin Anwar M.A.</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card h-100">
                <img src="book3.jpeg" class="card-img-top" alt="">
                <div class="card-body text-center">
                    <h6 class="card-title">Robotics</h6>
                    <p class="card-text">SK SAHA</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card h-100">
                <img src="book4.jpeg" class="card-img-top" alt="">
                <div class="card-body text-center">
                    <h6 class="card-title">
                        Implementasi Tanggung Jawab Kejaksaan Negeri dalam Pemberatasan Tindak Pidana Korupsi di Indonesia
                    </h6>
                    <p class="card-text">Boby Daniel Simatupang</p>
                </div>
            </div>
        </div>

    </div>

</div>
