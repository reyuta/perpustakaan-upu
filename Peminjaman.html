<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Peminjaman Buku | Perpustakaan Potensi Utama</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

background:#F4F8FC;
font-family:'Poppins',sans-serif;

}

.header{

background:linear-gradient(135deg,#1E40AF,#2563EB,#60A5FA);
padding:60px 0;
color:white;
text-align:center;

}

.header h1{

font-weight:700;

}

.card{

border:none;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);

}

.progress{

height:25px;
border-radius:50px;

}

.progress-bar{

font-weight:bold;

}

.btn-primary{

background:#2563EB;
border:none;

}

.btn-primary:hover{

background:#1D4ED8;

}

.btn-home{

background:#6B7280;
color:white;

}

.btn-home:hover{

background:#4B5563;
color:white;

}

.syarat{

background:#F8FAFC;
padding:15px;
border-radius:10px;
margin-bottom:20px;

}

.footer{

text-align:center;
padding:20px;
color:#6B7280;

}

</style>

</head>

<body>

<div class="header">

<h1><i class="bi bi-book-half"></i> Form Peminjaman Buku</h1>

<p>Perpustakaan Universitas Potensi Utama</p>

</div>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card p-4">

<h3 class="text-center text-primary mb-4">

Silakan Isi Data Peminjaman

</h3>

<div id="alertArea"></div>

<form>

<div class="mb-3">

<label class="form-label">

Nama Mahasiswa

</label>

<input
type="text"
class="form-control"
id="nama">

</div>

<div class="mb-3">

<label class="form-label">

NIM

</label>

<input
type="text"
class="form-control"
id="nim">

</div>

<div class="mb-3">

<label class="form-label">

Judul Buku

</label>

<select
class="form-select">

<option>Bank Syari'ah</option>

<option>Sikap Manusia</option>

<option>Robotics</option>

<option>Implementasi Tindak Pidana Korupsi</option>

</select>

</div>

<div class="syarat">

<h5 class="mb-3">

Syarat Peminjaman

</h5>

<div class="form-check">

<input class="form-check-input syaratCheck" type="checkbox">

<label class="form-check-label">

Mahasiswa aktif Universitas Potensi Utama.

</label>

</div>

<div class="form-check">

<input class="form-check-input syaratCheck" type="checkbox">

<label class="form-check-label">

Menunjukkan KTM yang masih berlaku.

</label>

</div>

<div class="form-check">

<input class="form-check-input syaratCheck" type="checkbox">

<label class="form-check-label">

Tidak memiliki tunggakan peminjaman buku.

</label>

</div>

<div class="form-check">

<input class="form-check-input syaratCheck" type="checkbox">

<label class="form-check-label">

Bersedia mengembalikan buku tepat waktu.

</label>

</div>

</div>

<h6>

Progress Persetujuan

</h6>

<div class="progress mb-4">

<div
id="progressBar"
class="progress-bar progress-bar-striped progress-bar-animated bg-success"
style="width:0%">

0%

</div>

</div>

<div class="d-grid gap-2">

<button
type="button"
class="btn btn-primary"
onclick="pinjamBuku()">

<i class="bi bi-journal-check"></i>

Pinjam Buku

</button>

<a
href="Perpustakaan.html"
class="btn btn-home">

<i class="bi bi-house-door-fill"></i>

Back To Home

</a>

</div>

</form>

</div>

</div>

</div>

</div>

<script>

const check=document.querySelectorAll(".syaratCheck");

check.forEach(item=>{

item.addEventListener("change",updateProgress);

});

function updateProgress(){

let total=check.length;

let selesai=0;

check.forEach(item=>{

if(item.checked){

selesai++;

}

});

let persen=(selesai/total)*100;

document.getElementById("progressBar").style.width=persen+"%";

document.getElementById("progressBar").innerHTML=persen+"%";

}

function pinjamBuku(){

let nama=document.getElementById("nama").value.trim();

let nim=document.getElementById("nim").value.trim();

let selesai=0;

check.forEach(item=>{

if(item.checked){

selesai++;

}

});

if(nama=="" || nim==""){

document.getElementById("alertArea").innerHTML=`

<div class="alert alert-warning">

<i class="bi bi-exclamation-triangle-fill"></i>

Silakan lengkapi Nama dan NIM terlebih dahulu.

</div>

`;

return;

}

if(selesai<4){

document.getElementById("alertArea").innerHTML=`

<div class="alert alert-danger">

<i class="bi bi-x-circle-fill"></i>

Seluruh syarat peminjaman harus disetujui terlebih dahulu.

</div>

`;

return;

}

document.getElementById("alertArea").innerHTML=`

<div class="alert alert-success">

<i class="bi bi-check-circle-fill"></i>

Peminjaman berhasil dilakukan.
Silakan mengambil buku di perpustakaan.

</div>

`;

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
